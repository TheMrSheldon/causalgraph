name: Build and Publish Docker Images

on:
  push:
    branches: [main, master]
  release:
    types: [published]

jobs:
  publish:
    name: Build & push images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # ── Determine image tag and build metadata ───────────────────────────
      - name: Set image tag and version
        id: meta
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%d)
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            IMAGE_TAG="${VERSION}"
          else
            VERSION="${{ github.sha }}"
            IMAGE_TAG="nightly"
          fi
          echo "version=${VERSION}"    >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_TAG}"      >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "registry=ghcr.io/${{ github.repository_owner }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.registry }}/rscience-frontend:${{ steps.meta.outputs.tag }}
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      # ── Backend ──────────────────────────────────────────────────────────
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.registry }}/rscience-backend:${{ steps.meta.outputs.tag }}
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      # ── Pipeline ─────────────────────────────────────────────────────────
      - name: Build and push pipeline
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.pipeline
          push: true
          tags: ${{ steps.meta.outputs.registry }}/rscience-pipeline:${{ steps.meta.outputs.tag }}
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha,scope=pipeline
          cache-to:   type=gha,scope=pipeline,mode=max
