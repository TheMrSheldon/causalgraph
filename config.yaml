pipeline:
  parquet_path: "rscience-submissions.parquet"
  db_path: "data/pipeline.db"
  batch_size: 5000        # Posts per batch for step 1
  min_score: 1            # Skip posts with score below this

  step1_detection:
    implementation: "regex"       # Options: regex | llm_openai | llm_anthropic | zero_shot

    # Zero-shot options (only used when implementation = zero_shot)
    zero_shot_model: "facebook/bart-large-mnli"
    zero_shot_threshold: 0.75

    # LLM options (only used when implementation = llm_openai or llm_anthropic)
    llm_model: "claude-haiku-4-5-20251001"
    llm_batch_size: 50

  step2_extraction:
    implementation: "regex_spacy"   # Options: regex_spacy | llm_openai | llm_anthropic
    spacy_model: "en_core_web_sm"   # or en_core_web_trf for better accuracy

    # LLM options (only used when implementation = llm_*)
    llm_model: "claude-haiku-4-5-20251001"
    llm_max_tokens: 512

  step3_canonization:
    implementation: "transformer"   # Options: passthrough | transformer | llm_openai | llm_anthropic

    # Transformer options (only used when implementation = transformer)
    model_name: "google/flan-t5-base"  # Any HuggingFace text2text-generation model
    batch_size: 64                     # Prompts per batch; increase for GPU
    max_new_tokens: 20                 # Max output length; event spans are short
    device: -1                         # -1 = CPU; 0 = first CUDA GPU
    fast_path: true                    # Skip model for already-self-contained spans

    # LLM options (only used when implementation = llm_*)
    llm_model: "claude-haiku-4-5-20251001"
    llm_batch_size: 50
    llm_max_tokens: 1024

  step4_hierarchy:
    implementation: "embedding_ward"  # Options: embedding_hdbscan | tfidf_ward | embedding_ward | llm

    # Embedding + Ward linkage options (used when implementation = embedding_ward)
    embedding_model: "all-MiniLM-L6-v2"
    linkage_method: "ward"
    n_clusters_per_level: [500, 100, 20]  # clusters at each level, finest → coarsest
                                           # list length = number of levels (no upper limit)
    max_texts: 8000    # O(n^2) memory cap; texts beyond this assigned by nearest centroid
    use_norm: false    # false = embed canonical description; true = embed lowercased norm

    # TF-IDF options (only used when implementation = tfidf_ward)
    tfidf_max_features: 5000
    tfidf_n_top_clusters: 200

    # Embedding HDBSCAN options (only used when implementation = embedding_hdbscan)
    min_cluster_size: 10
    min_samples: 5

    # LLM options (only used when implementation = llm)
    llm_model: "claude-haiku-4-5-20251001"
    llm_n_topics: 30

api:
  host: "0.0.0.0"
  port: 8000
  db_path: "data/pipeline.db"
  cors_origins:
    - "http://localhost:5173"   # Vite dev server
    - "http://localhost:3000"

pipeline_server:
  host: "0.0.0.0"
  port: 8001
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
